name: Run Databricks Tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON string of Python versions"
        type: string
        required: true
    secrets:
      DATABRICKS_HOST:
        required: true
      DATABRICKS_HTTP_PATH:
        required: true
      DATABRICKS_TOKEN:
        required: true

jobs:
  sf-tests:
    name: Databricks Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.0"

      - name: Create virtual environment
        # uv requires an existing virtual environment to install packages.
        # Running `uv venv` creates the `.venv` directory so that subsequent
        # `uv pip install` commands install dependencies inside this environment.
        # Without this step, `uv pip install` fails with 
        # "No virtual environment found".
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e ".[databricks]"

      - name: Confirm Databricks connector is installed
        run: uv run python -c "import databricks; print('Databricks connector installed')"

      - name: Run Databricks Tests
        run: uv run pytest -m databricks tests/ -rs
