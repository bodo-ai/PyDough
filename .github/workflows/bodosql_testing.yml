name: Run BodoSQL Tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON string of Python versions"
        type: string
        required: true

jobs:
  bodosql-tests:
    name: BodoSQL Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.0"

      - name: Create virtual environment
        # uv requires an existing virtual environment to install packages.
        # Running `uv venv` creates the `.venv` directory so that subsequent
        # `uv pip install` commands install dependencies inside this environment.
        # Without this step, `uv pip install` fails with 
        # "No virtual environment found".
        run: uv venv

      - name: Install dependencies
        # TODO: Remove this override once the LLM package supports pyarrow>=23.
        # The base pydough package pins pyarrow==22 for LLM compatibility, but
        # bodo (via the bodosql extra) requires pyarrow>=23. The override lets
        # uv bypass the base constraint for this environment.
        run: |
          echo "pyarrow>=23" > /tmp/pyarrow-override.txt
          uv pip install -e ".[bodosql]" --override /tmp/pyarrow-override.txt
          PYARROW_LIB=$(uv run --no-sync python -c "import os, pyarrow; print(os.path.dirname(pyarrow.__file__))")
          echo "LD_LIBRARY_PATH=${PYARROW_LIB}:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV

      - name: Confirm BodoSQL and related dependencies are installed
        run: uv run --no-sync python -c "import bodo; import bodosql; import pyarrow; import pyiceberg; print(bodo.__version__, bodosql.__version__, pyarrow.__version__, pyiceberg.__version__)"

      - name: Download TPCH DB
        run: ./demos/setup_tpch.sh ./tpch.db

      - name: Run BodoSQL Tests
        run: uv run --no-sync pytest -m bodosql tests/ -rs
