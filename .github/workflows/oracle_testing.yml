name: Run Oracle Tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON string of Python versions"
        type: string
        required: true
    secrets:
      ORACLE_PASSWORD:
        required: true

jobs:
  oracle-tests:
    name: Oracle Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    # Define services here to run Docker containers alongside your job
    services:
      oracle:
        image: bodoai1/pydough-oracle-tpch:latest
        env:
          # Set environment variables for Oracle container
          ORACLE_PWD: ${{ secrets.ORACLE_PASSWORD }}
        ports:
          - 1521:1521
    env:
      ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
      ORACLE_SERVICE: FREEPDB1
      ORACLE_HOST: 127.0.0.1
      ORACLE_PORT: 1521

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.23"

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e ".[oracle]"

      - name: Debug Oracle container (DELETE LATER)
        run: |
          echo "=== docker ps ==="
          docker ps -a

          echo "=== oracle logs (last 300 lines) ==="
          docker logs --tail 300 ${{ job.services.oracle.id }}

      - name: Check Oracle network (DELETE LATER)
        run: |
          echo "Checking Oracle TCP port on localhost"

          for i in {1..10}; do
            if nc -z 127.0.0.1 1521; then
              echo "Oracle port is open on localhost"
              exit 0
            fi

            echo "Waiting for Oracle port on localhost... ($i/10)"
            sleep 5
          done

          echo "Oracle port never opened on localhost"
          docker ps -a
          docker logs ${{ job.services.oracle.id }}
          exit 1

      - name: Test Oracle inside container (DELETE LATER)
        run: |
          docker exec ${{ job.services.oracle.id }} bash -c "
            echo 'SELECT name, open_mode FROM v\$pdbs;' |
            sqlplus -s system/$ORACLE_PASSWORD@localhost:1521/FREEPDB1
          "

      - name: Check TPCH loader (DELETE LATER)
        run: |
          docker exec ${{ job.services.oracle.id }} ls -l /opt/oracle/scripts/startup || true
          docker logs ${{ job.services.oracle.id }} | grep -i tpch || true

      - name: Wait for TPCH data to load
        run: |
          for i in {1..600}; do
            if docker logs ${{ job.services.oracle.id }} 2>&1 | grep -q "02_tpch_data.sh"; then
              echo "TPCH data loaded"
              break
            fi
            echo "Waiting for TPCH load... ($i/600)"
            sleep 5
          done

      - name: Confirm Oracle connector is installed
        run: uv run python -c "import oracledb; print('Oracle connector installed')"

      - name: Run Oracle Tests
        run: uv run pytest -m oracle tests/ -rs
